version: "3.9"

services:
  flap-backend:
    image: python:3.11-slim
    container_name: flap-backend
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app/backend
      - ./.env:/app/.env:ro
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      chromadb:
        condition: service_started
      ollama:
        condition: service_started
    restart: always
    mem_limit: 1024m
    cpus: "1.50"
    networks:
      - flap-net

  flap-terminal:
    image: node:20-alpine
    container_name: flap-terminal
    working_dir: /app
    command: >
      sh -c "npm install --silent &&
      npm run start"
    volumes:
      - ./terminal-server:/app
    ports:
      - "3001:3001"
    restart: always
    mem_limit: 512m
    cpus: "1.00"
    networks:
      - flap-net

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: flap-chromadb
    environment:
      ANONYMIZED_TELEMETRY: "false"
      IS_PERSISTENT: "true"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    restart: always
    mem_limit: 512m
    cpus: "1.00"
    networks:
      - flap-net

  ollama:
    image: ollama/ollama:latest
    container_name: flap-ollama
    command: ["serve"]
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "30m"
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    mem_limit: 2048m
    cpus: "2.00"
    networks:
      - flap-net

  n8n:
    image: n8nio/n8n:latest
    container_name: flap-n8n
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      TZ: Asia/Kolkata
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always
    mem_limit: 768m
    cpus: "1.00"
    networks:
      - flap-net

volumes:
  chromadb_data:
  ollama_data:
  n8n_data:

networks:
  flap-net:
    driver: bridge
